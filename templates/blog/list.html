{% extends "generic/list.html" %}
{% block table_row %}
<td><a href="{% url 'blog_edit' obj.slug %}">{{ obj.title }}</a></td>
<td class="text-mono text-muted text-sm">{{ obj.slug }}</td>
<td>
  <div class="toggle-wrap" data-toggle-url="{% url 'toggle_status' 'blog' obj.pk %}">
    <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
  </div>
</td>

<td>
  <div class="action-group">
    <a href="{% url 'blog_edit' obj.slug %}" class="action-btn edit"><i class="fa-solid fa-pen"></i></a>
    <button class="action-btn delete" onclick="openDeleteModal('{% url 'delete_object' 'blog' obj.pk %}', '{{ obj.title|escapejs }}')">
      <i class="fa-solid fa-trash"></i>
    </button>
  </div>
</td>
{% endblock %}
