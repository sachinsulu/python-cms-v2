{% extends "generic/list.html" %}

{% block table_headers %}
<th>Title</th>
<th>Status</th>
<th>Actions</th>
{% endblock %}

{% block table_row %}
<td>
    <div class="fw-bold">{{ obj.title }}</div>
</td>
<td>
    <div class="toggle-wrap" data-toggle-url="{% url 'toggle_status' 'faq' obj.pk %}" title="Toggle">
        <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
    </div>
</td>
<td>
    <div class="action-group">
        <a href="{% url 'faq_edit' obj.slug %}" class="action-btn edit" title="Edit">
            <i class="fa-solid fa-pen"></i>
        </a>
        <button class="action-btn delete" title="Delete" 
                onclick="openDeleteModal('{% url 'delete_object' 'faq' obj.pk %}', '{{ obj.title|escapejs }}')">
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</td>
{% endblock %}
