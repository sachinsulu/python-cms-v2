{% extends "generic/list.html" %}
{% block table_row %}
<td><a href="{% url 'package_edit' obj.slug %}">{{ obj.title }}</a></td>
<td class="text-muted text-sm">{{ obj.get_package_type_display }}</td>
<td>
  <div class="toggle-wrap" data-toggle-url="/core/toggle/package/{{ obj.pk }}/">
    <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
  </div>
</td>
<td class="text-muted text-sm">{{ obj.updated_at|timesince }} ago</td>
<td>
  <div class="action-group">
    <a href="{% url 'subpackage_list' obj.slug %}" class="action-btn" title="Sub-packages"><i class="fa-solid fa-layer-group"></i></a>
    <a href="{% url 'package_edit' obj.slug %}" class="action-btn edit"><i class="fa-solid fa-pen"></i></a>
    <button class="action-btn delete" onclick="openDeleteModal('/core/delete/package/{{ obj.pk }}/', '{{ obj.title|escapejs }}')"><i class="fa-solid fa-trash"></i></button>
  </div>
</td>
{% endblock %}
