{% extends "generic/list.html" %}
{% block table_headers %}
<th>Title</th>
<th>Type</th>
<th>Status</th>
<th>Sub-Packages</th>
<th>Actions</th>
{% endblock %}

{% block table_row %}
<td><a href="{% url 'package_edit' obj.slug %}">{{ obj.title }}</a></td>
<td class="text-muted text-sm">{{ obj.get_package_type_display }}</td>
<td>
  <div class="toggle-wrap" data-toggle-url="/core/toggle/package/{{ obj.pk }}/">
    <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
  </div>
</td>
<td>
  <a href="{% url 'subpackage_list' obj.slug %}" class="btn btn-secondary btn-sm" style="font-size: 11px; padding: 4px 8px;">
    <i class="fa-solid fa-layer-group"></i> Manage Sub-Packages ({{ obj.sub_packages.count }})
  </a>
</td>
<td>
  <div class="action-group">
    <a href="{% url 'package_edit' obj.slug %}" class="action-btn edit" title="Edit"><i class="fa-solid fa-pen"></i></a>
    <button class="action-btn delete" title="Delete" onclick="openDeleteModal('/core/delete/package/{{ obj.pk }}/', '{{ obj.title|escapejs }}')"><i class="fa-solid fa-trash"></i></button>
  </div>
</td>
{% endblock %}
