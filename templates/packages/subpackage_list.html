{% extends "generic/list.html" %}

{% block header_extras %}
    <a href="{% url 'package_list' %}" class="btn btn-secondary">
      <i class="fa-solid fa-arrow-left"></i> Back to Packages
    </a>
    <a href="{% url 'subpackage_create' parent.slug %}" class="btn btn-primary">
      <i class="fa-solid fa-plus"></i> Add Sub-Package
    </a>
{% endblock %}

{% block table_row %}
<td>
    <a href="{% url 'subpackage_edit' parent.slug obj.slug %}">{{ obj.title }}</a>
</td>
<td class="text-mono text-muted text-sm">{{ obj.slug }}</td>
<td>
  <div class="toggle-wrap"
       data-toggle-url="/core/toggle/subpackage/{{ obj.pk }}/"
       title="Toggle status">
    <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
  </div>
</td>

<td>
  <div class="action-group">
    <a href="{% url 'subpackage_edit' parent.slug obj.slug %}"
       class="action-btn edit" title="Edit">
      <i class="fa-solid fa-pen"></i>
    </a>
    <button class="action-btn delete" title="Delete"
            onclick="openDeleteModal('/core/delete/subpackage/{{ obj.pk }}/', '{{ obj.title|escapejs }}')">
      <i class="fa-solid fa-trash"></i>
    </button>
  </div>
</td>
{% endblock %}
