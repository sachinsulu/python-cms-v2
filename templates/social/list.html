{% extends "generic/list.html" %}

{#
  Social list — only overrides header_extras to add the Social/OTA type filter.
  All columns come from list_columns defined on SocialListView.
#}

{% block header_extras %}
<select
  onchange="window.location.href='?type='+this.value"
  style="padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:13px; background:var(--card-bg);">
  <option value="social" {% if current_type == 'social' %}selected{% endif %}>Social Media</option>
  <option value="ota"    {% if current_type == 'ota'    %}selected{% endif %}>OTA / Booking</option>
</select>
{% endblock %}
