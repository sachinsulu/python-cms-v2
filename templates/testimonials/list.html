{% extends "generic/list.html" %}
{% block table_headers %}
<th>Title / Name</th><th>Rating</th><th>Via</th><th>Status</th><th>Actions</th>
{% endblock %}
{% block table_row %}
<td>
  <a href="{% url 'testimonial_edit' obj.slug %}">{{ obj.title }}</a>
  <div class="text-muted text-sm">{{ obj.name }}</div>
</td>
<td>{% for i in "12345" %}{% if forloop.counter <= obj.rating %}⭐{% endif %}{% endfor %}</td>
<td><span class="badge badge-gray">{{ obj.get_via_type_display }}</span></td>
<td>
  <div class="toggle-wrap" data-toggle-url="/core/toggle/testimonial/{{ obj.pk }}/">
    <div class="toggle-switch {% if obj.is_active %}on{% endif %}"></div>
  </div>
</td>
<td>
  <div class="action-group">
    <a href="{% url 'testimonial_edit' obj.slug %}" class="action-btn edit"><i class="fa-solid fa-pen"></i></a>
    <button class="action-btn delete" onclick="openDeleteModal('/core/delete/testimonial/{{ obj.pk }}/', '{{ obj.title|escapejs }}')"><i class="fa-solid fa-trash"></i></button>
  </div>
</td>
{% endblock %}
